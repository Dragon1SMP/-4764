<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon SMP | Giriş</title>
    
    <style>
        /* CSS KODLARI - Animasyonlar kapalı */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: none !important; }
        
        body { 
            background: #f0f2f5; 
            color: #333; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hidden { display: none !important; }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(240, 242, 245, 0.8), rgba(240, 242, 245, 0.8)), 
                        url('https://images.alphacoders.com/133/1331005.png') center/cover no-repeat;
            z-index: -1;
        }

        /* Çıkış Yap Butonu - Sağ Üst */
        .logout-btn {
            position: fixed; top: 20px; right: 20px;
            background: #cc0000; color: white; border: none;
            padding: 10px 20px; border-radius: 8px;
            cursor: pointer; font-weight: bold; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* KIRMIZI HATA YAZISI */
        .error-text { color: #ff0000; font-weight: bold; margin-top: 10px; font-size: 0.9rem; display: block; text-align: center; }

        .auth-box {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
            width: 100%; max-width: 400px;
        }
        .auth-box h1 { color: #ff4500; margin-bottom: 20px; font-size: 2.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .main-btn { width: 100%; padding: 12px; background: #ff4500; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .toggle-link { margin-top: 15px; font-size: 0.9rem; color: #666; cursor: pointer; text-decoration: underline; }

        .main-container { width: 95%; max-width: 1000px; }
        .user-welcome { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; text-align: center; }
        .user-welcome h1 { color: #ff4500; margin-bottom: 10px; }
        .ip-box { background: #f9f9f9; padding: 10px 20px; border-radius: 10px; display: inline-block; border: 1px solid #eee; }
        .copy-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-left: 10px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .menu-card { background: white; padding: 35px; border-radius: 20px; cursor: pointer; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-icon { font-size: 3rem; margin-bottom: 15px; }

        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .rank-circle { width: 45px; height: 45px; background: #ff4500; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: bold; }
        .buy-btn { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .back-btn { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .popup-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <button id="global-logout" onclick="location.reload()" class="logout-btn hidden">Çıkış Yap</button>

    <div id="auth-screen" class="auth-box">
        <h1>DRAGON SMP</h1>
        <div id="login-fields">
            <input type="text" id="log-username" placeholder="Kullanıcı Adı">
            <input type="password" id="log-password" placeholder="Şifre">
            <button onclick="handleLogin()" class="main-btn">Giriş Yap</button>
            <p onclick="toggleAuth()" class="toggle-link">Bir hesabın yokmu? kayıt ol</p>
            <span id="log-msg" class="error-text"></span>
        </div>

        <div id="register-fields" class="hidden">
            <input type="text" id="reg-username" placeholder="Yeni Kullanıcı Adı">
            <input type="password" id="reg-password" placeholder="Şifre">
            <button onclick="handleRegister()" class="main-btn">Kayıt Ol</button>
            <p onclick="toggleAuth()" class="toggle-link">Zaten hesabın var mı? Giriş Yap</p>
            <span id="reg-msg" class="error-text"></span>
        </div>
    </div>

    <div id="account-page" class="main-container hidden">
        <header class="user-welcome">
            <h1>HOŞ GELDİN, <span id="user-display">OYUNCU</span></h1>
            <div class="ip-box">
                Sunucu IP: <span id="server-ip">play.dragonsmp.com</span>
                <button onclick="copyIP()" class="copy-btn">Kopyala</button>
            </div>
        </header>

        <div class="grid-container">
            <div class="menu-card" onclick="showScreen('market-screen')">
                <div class="card-icon">🛒</div>
                <h3>MARKET</h3>
                <p>Üyelik paketlerini incele.</p>
            </div>
            <div class="menu-card" onclick="showRules()">
                <div class="card-icon">📜</div>
                <h3>KURALLAR</h3>
                <p>Sunucu kurallarını oku.</p>
            </div>
            <div class="menu-card" onclick="showContact()">
                <div class="card-icon">📞</div>
                <h3>İLETİŞİM</h3>
                <p>Destek ve Mail.</p>
            </div>
        </div>
    </div>

    <div id="market-screen" class="main-container hidden">
        <button onclick="showScreen('account-page')" class="back-btn">← Geri Dön</button>
        <h1 style="text-align: center; color: #ff4500; margin-bottom: 20px;">MARKET</h1>
        <div class="market-grid">
            <div class="product-card">
                <div class="rank-circle">1</div>
                <h3>Seviye 1</h3>
                <button class="buy-btn">Satın Al</button>
            </div>
            <div class="product-card">
                <div class="rank-circle">2</div>
                <h3>Seviye 2</h3>
                <button class="buy-btn">Satın Al</button>
            </div>
            <div class="product-card">
                <div class="rank-circle">3</div>
                <h3>Seviye 3</h3>
                <button class="buy-btn">Satın Al</button>
            </div>
        </div>
    </div>

    <div id="popup" class="popup-overlay hidden">
        <div class="popup-content">
            <h2 id="popup-title" style="color:#ff4500; margin-bottom:15px;"></h2>
            <div id="popup-body"></div>
            <button onclick="closePopup()" class="main-btn" style="background:#333;">Kapat</button>
        </div>
    </div>

    <script>
        const databaseURL = "https://dragonsmp-26d18-default-rtdb.europe-west1.firebasedatabase.app/";

        function showScreen(id) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('account-page').classList.add('hidden');
            document.getElementById('market-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id !== 'auth-screen') { document.getElementById('global-logout').classList.remove('hidden'); }
        }

        function toggleAuth() {
            document.getElementById('login-fields').classList.toggle('hidden');
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('log-msg').innerText = "";
            document.getElementById('reg-msg').innerText = "";
        }

        async function handleRegister() {
            const user = document.getElementById('reg-username').value.trim();
            const pass = document.getElementById('reg-password').value;
            const msg = document.getElementById('reg-msg');
            if(!user || !pass) { msg.innerText = "Boş alan bırakma!"; return; }
            try {
                const res = await fetch(`${databaseURL}/users/${user}.json`);
                if(await res.json()) { msg.innerText = "Bu isim zaten alınmış!"; return; }
                await fetch(`${databaseURL}/users/${user}.json`, { method: 'PUT', body: JSON.stringify({ password: pass }) });
                msg.style.color = "green";
                msg.innerText = "Kayıt başarılı! Giriş yapabilirsin.";
                setTimeout(toggleAuth, 1200);
            } catch (e) { msg.innerText = "Hata oluştu!"; }
        }

        async function handleLogin() {
            const user = document.getElementById('log-username').value.trim();
            const pass = document.getElementById('log-password').value;
            const msg = document.getElementById('log-msg');
            try {
                const res = await fetch(`${databaseURL}/users/${user}.json`);
                const data = await res.json();
                if(data && data.password === pass) {
                    document.getElementById('user-display').innerText = user;
                    showScreen('account-page');
                } else { msg.innerText = "Hatalı kullanıcı adı veya şifre!"; }
            } catch (e) { msg.innerText = "Bağlantı hatası!"; }
        }

        function copyIP() {
            navigator.clipboard.writeText("play.dragonsmp.com");
            alert("IP Kopyalandı!");
        }

        function showRules() {
            document.getElementById('popup-title').innerText = "📜 Sunucu Kuralları";
            document.getElementById('popup-body').innerHTML = "• Küfür yasak.<br>• Hile yasak.<br>• Grief yasak.";
            document.getElementById('popup').classList.remove('hidden');
        }

        function showContact() {
            document.getElementById('popup-title').innerText = "📞 İletişim Bilgileri";
            document.getElementById('popup-body').innerHTML = "<b>Mail:</b> destek@dragonsmp.com<br><b>Instagram:</b> @dragonsmp";
            document.getElementById('popup').classList.remove('hidden');
        }

        function closePopup() { document.getElementById('popup').classList.add('hidden'); }
    </script>
</body>
</html>
