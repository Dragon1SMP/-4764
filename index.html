<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon SMP | Full Panel</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: none !important; }
        body { background: #f0f2f5; color: #333; min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        .hidden { display: none !important; }
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(240, 242, 245, 0.8), rgba(240, 242, 245, 0.8)), url('https://images.alphacoders.com/133/1331005.png') center/cover no-repeat; z-index: -1; }
        .logout-btn { position: fixed; top: 20px; right: 20px; background: #cc0000; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .error-text { color: #ff0000; font-weight: bold; margin-top: 10px; font-size: 0.85rem; display: block; text-align: center; }
        .auth-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        .auth-box h1 { color: #ff4500; margin-bottom: 20px; font-size: 2.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; width: 100%; }
        .main-btn { width: 100%; padding: 12px; background: #ff4500; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .toggle-link { margin-top: 15px; font-size: 0.9rem; color: #666; cursor: pointer; text-decoration: underline; display: block; }
        .main-container { width: 95%; max-width: 1000px; }
        .user-welcome { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; text-align: center; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .menu-card { background: white; padding: 35px; border-radius: 20px; cursor: pointer; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-icon { font-size: 3rem; margin-bottom: 15px; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .buy-btn { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .back-btn { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .popup-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <button id="global-logout" onclick="location.reload()" class="logout-btn hidden">Çıkış Yap</button>

    <div id="auth-screen" class="auth-box">
        <h1>DRAGON SMP</h1>
        
        <div id="login-fields">
            <input type="text" id="log-username" placeholder="Kullanıcı Adı">
            <input type="password" id="log-password" placeholder="Şifre">
            <button onclick="handleLogin()" class="main-btn">Giriş Yap</button>
            <p onclick="showForgot()" class="toggle-link" style="color: #ff4500;">Şifremi Unuttum</p>
            <p onclick="toggleAuth()" class="toggle-link">Kayıt Ol</p>
            <span id="log-msg" class="error-text"></span>
        </div>

        <div id="register-fields" class="hidden">
            <input type="text" id="reg-username" placeholder="Yeni Kullanıcı Adı">
            <input type="email" id="reg-email" placeholder="E-posta (@gmail.com)">
            <input type="password" id="reg-password" placeholder="Şifre">
            <button onclick="sendVerificationCode()" class="main-btn">Onay Kodu Gönder</button>
            <p onclick="toggleAuth()" class="toggle-link">Vazgeç</p>
            <span id="reg-msg" class="error-text"></span>
        </div>

        <div id="verify-screen" class="hidden">
            <h3>Doğrulama</h3>
            <p style="font-size:0.8rem; margin:10px 0;">Mailine gelen 6 haneli kodu yaz:</p>
            <input type="text" id="verification-input" placeholder="Onay Kodu">
            <button onclick="completeRegistration()" class="main-btn">Onayla ve Kayıt Ol</button>
            <span id="verify-msg" class="error-text"></span>
        </div>

        <div id="forgot-screen" class="hidden">
            <h3>Şifre Kurtarma</h3>
            <input type="text" id="forgot-user" placeholder="Kullanıcı Adı">
            <input type="email" id="forgot-email" placeholder="Kayıtlı E-posta">
            <button onclick="resetPassword()" class="main-btn">Şifremi Gönder</button>
            <p onclick="showLogin()" class="toggle-link">Geri Dön</p>
            <span id="forgot-msg" class="error-text"></span>
        </div>
    </div>

    <div id="account-page" class="main-container hidden">
        <header class="user-welcome">
            <h1>HOŞ GELDİN, <span id="user-display"></span></h1>
            <p>Sunucu IP: <b>play.dragonsmp.com</b></p>
        </header>
        <div class="grid-container">
            <div class="menu-card" onclick="showScreen('market-screen')"><div class="card-icon">🛒</div><h3>MARKET</h3></div>
            <div class="menu-card" onclick="showRules()"><div class="card-icon">📜</div><h3>KURALLAR</h3></div>
            <div class="menu-card" onclick="showContact()"><div class="card-icon">📞</div><h3>İLETİŞİM</h3></div>
        </div>
    </div>

    <div id="market-screen" class="main-container hidden">
        <button onclick="showScreen('account-page')" class="back-btn">← Geri Dön</button>
        <div class="market-grid">
            <div class="product-card"><h3>VIP</h3><button class="buy-btn">Satın Al</button></div>
            <div class="product-card"><h3>VIP+</h3><button class="buy-btn">Satın Al</button></div>
            <div class="product-card"><h3>DRAGON</h3><button class="buy-btn">Satın Al</button></div>
        </div>
    </div>

    <div id="popup" class="popup-overlay hidden">
        <div class="popup-content">
            <h2 id="popup-title" style="color:#ff4500; margin-bottom:15px;"></h2>
            <div id="popup-body" style="text-align: left; line-height: 1.6; max-height: 300px; overflow-y: auto;"></div>
            <button onclick="closePopup()" class="main-btn" style="background:#333; margin-top:20px;">Kapat</button>
        </div>
    </div>

    <script>
        const databaseURL = "https://dragonsmp-26d18-default-rtdb.europe-west1.firebasedatabase.app/";
        const emailJS_Public = "Kr498zDgywire0QFp";
        const emailJS_Service = "service_zmj49kp";
        const emailJS_Template = "template_oole4d8";

        emailjs.init(emailJS_Public);

        let generatedCode = null;
        let tempUser = {};

        function showScreen(id) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('account-page').classList.add('hidden');
            document.getElementById('market-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id !== 'auth-screen') document.getElementById('global-logout').classList.remove('hidden');
        }

        function toggleAuth() {
            document.getElementById('login-fields').classList.toggle('hidden');
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('verify-screen').classList.add('hidden');
        }

        function showForgot() { document.getElementById('login-fields').classList.add('hidden'); document.getElementById('forgot-screen').classList.remove('hidden'); }
        function showLogin() { document.getElementById('forgot-screen').classList.add('hidden'); document.getElementById('login-fields').classList.remove('hidden'); }

        // KAYIT VE KOD GÖNDERME
        async function sendVerificationCode() {
            const user = document.getElementById('reg-username').value.trim();
            const mail = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value;
            const msg = document.getElementById('reg-msg');

            if(!user || !mail || !pass) { msg.innerText = "Lütfen tüm alanları doldur!"; return; }
            if(!mail.endsWith("@gmail.com")) { msg.innerText = "Sadece @gmail.com kabul edilir!"; return; }

            try {
                const res = await fetch(`${databaseURL}/users/${user}.json`);
                const existing = await res.json();
                if(existing) { msg.innerText = "Bu kullanıcı adı zaten alınmış!"; return; }

                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                msg.style.color = "orange";
                msg.innerText = "Mail gönderiliyor...";

                emailjs.send(emailJS_Service, emailJS_Template, {
                    to_email: mail,
                    user_name: user,
                    onay_kodu: generatedCode
                }).then(() => {
                    tempUser = { user, mail, pass };
                    document.getElementById('register-fields').classList.add('hidden');
                    document.getElementById('verify-screen').classList.remove('hidden');
                }, (error) => {
                    msg.style.color = "red";
                    msg.innerText = "Mail hatası: " + error.text;
                    console.log("Hata detayı:", error);
                });
            } catch (e) { msg.innerText = "Bağlantı hatası!"; }
        }

        async function completeRegistration() {
            const codeInput = document.getElementById('verification-input').value.trim();
            const msg = document.getElementById('verify-msg');

            if(codeInput === generatedCode) {
                try {
                    await fetch(`${databaseURL}/users/${tempUser.user}.json`, {
                        method: 'PUT',
                        body: JSON.stringify({ password: tempUser.pass, email: tempUser.mail })
                    });
                    alert("Kayıt Başarılı! Sunucuya katılabilirsin.");
                    location.reload();
                } catch (e) { msg.innerText = "Kayıt sırasında hata!"; }
            } else {
                msg.innerText = "Hatalı kod girdin!";
            }
        }

        async function handleLogin() {
            const user = document.getElementById('log-username').value.trim();
            const pass = document.getElementById('log-password').value;
            const msg = document.getElementById('log-msg');

            if(!user || !pass) { msg.innerText = "Alanları doldur!"; return; }

            try {
                const res = await fetch(`${databaseURL}/users/${user}.json`);
                const data = await res.json();
                if(data && data.password === pass) {
                    document.getElementById('user-display').innerText = user;
                    showScreen('account-page');
                } else {
                    msg.innerText = "Hatalı kullanıcı adı veya şifre!";
                }
            } catch (e) { msg.innerText = "Sunucu hatası!"; }
        }

        async function resetPassword() {
            const user = document.getElementById('forgot-user').value.trim();
            const mail = document.getElementById('forgot-email').value.trim();
            const msg = document.getElementById('forgot-msg');

            const res = await fetch(`${databaseURL}/users/${user}.json`);
            const data = await res.json();

            if(data && data.email === mail) {
                msg.style.color = "orange";
                msg.innerText = "Şifreniz gönderiliyor...";
                emailjs.send(emailJS_Service, emailJS_Template, {
                    to_email: mail,
                    user_name: user,
                    onay_kodu: "Şifreniz: " + data.password
                }).then(() => {
                    msg.style.color = "green";
                    msg.innerText = "Şifreniz mail kutunuza gönderildi!";
                });
            } else {
                msg.innerText = "Bilgiler eşleşmiyor!";
            }
        }

        function showRules() {
            document.getElementById('popup-title').innerText = "📜 Sunucu Kuralları";
            document.getElementById('popup-body').innerHTML = `
                • Küfür ve argo yasaktır.<br>
                • Reklam yapmak yasaktır.<br>
                • Trap serbesttir.<br>
                • Yetkilileri gereksiz etiketlemek yasaktır.<br>
                • Hile kullanımı sınırsız ban sebebidir.`;
            document.getElementById('popup').classList.remove('hidden');
        }

        function showContact() {
            document.getElementById('popup-title').innerText = "📞 İletişim Bilgileri";
            document.getElementById('popup-body').innerHTML = `
                <b>Mail:</b> dragonsmpdestek@gmail.com<br>
                <b>Instagram:</b> @dragonsmp <br>
                <b>Discord:</b> https://discord.gg/SQg9tPyzEE`;
            document.getElementById('popup').classList.remove('hidden');
        }

        function closePopup() { document.getElementById('popup').classList.add('hidden'); }
    </script>
</body>
</html>
